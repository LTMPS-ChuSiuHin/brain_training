<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藍循智能訓練基地</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+HK:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090a0f;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --neon-purple: #b026ff;
            --neon-green: #00ff66;
            --card-bg: rgba(12, 16, 26, 0.85);
            --text-color: #e2e8f0;
            --correct-color: rgba(0, 255, 102, 0.05);
            --wrong-color: rgba(255, 0, 85, 0.05);
        }

        body { 
            font-family: 'Noto Sans HK', sans-serif; 
            background-color: var(--bg-dark);
            color: var(--text-color); 
            text-align: center; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        /* 科技網格背景 */
        body::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 10s linear infinite;
            z-index: -2;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

        #app { 
            width: 90%; max-width: 500px; 
            background: var(--card-bg); 
            padding: 35px 25px; border-radius: 20px; 
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05), inset 0 0 20px rgba(0, 240, 255, 0.02); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-sizing: border-box; position: relative; max-height: 95vh; overflow-y: auto;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #app::-webkit-scrollbar { display: none; }
        #app { -ms-overflow-style: none; scrollbar-width: none; }

        /* 特效：柔和的震動與彈跳 */
        .shake { animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim { 10%, 90% { transform: translate3d(-3px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
        
        .pop { animation: popAnim 0.3s ease-out; }
        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .screen { display: none; animation: fadeInUp 0.4s ease forwards; }
        .screen.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { letter-spacing: 2px; margin-bottom: 25px;}
        h1 { font-size: 2.2em; color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); font-weight: 900;}
        h2 { font-size: 1.5em; color: #a0aec0; }

        button { 
            background: rgba(0, 240, 255, 0.05); 
            color: var(--neon-cyan); border: 1px solid var(--neon-cyan); 
            padding: 15px 20px; font-size: 1.2em; font-weight: 700; 
            margin: 10px; border-radius: 8px; cursor: pointer; width: 85%; max-width: 280px; 
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1), inset 0 0 5px rgba(0, 240, 255, 0.05); 
            transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Noto Sans HK', sans-serif;
        }
        button:hover { background: rgba(0, 240, 255, 0.15); color: #fff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); transform: translateY(-2px); }
        button:active { transform: translateY(2px); box-shadow: 0 0 5px rgba(0, 240, 255, 0.2); }
        button:disabled { background: rgba(255,255,255,0.05); border-color: #4a5568; color: #718096; box-shadow: none; cursor: not-allowed; }

        .back-btn { border-color: #718096; color: #a0aec0; box-shadow: none; margin-top: 25px;}
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); border-color: #cbd5e0;}
        
        .exit-btn {
            background: rgba(255, 0, 85, 0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); 
            padding: 6px 12px; font-size: 0.7em; border-radius: 6px; 
            width: auto; box-shadow: 0 0 8px rgba(255, 0, 85, 0.2); margin: 0; letter-spacing: 1px;
        }
        .exit-btn:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }

        .ranked-btn { 
            border-color: var(--neon-purple); color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.2), inset 0 0 10px rgba(176, 38, 255, 0.1);
            animation: pulseGlow 2s infinite; 
        }
        .ranked-btn:hover { background: rgba(176, 38, 255, 0.2); color: #fff; box-shadow: 0 0 25px rgba(176, 38, 255, 0.5); }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(176, 38, 255, 0.2); } 50% { box-shadow: 0 0 20px rgba(176, 38, 255, 0.5); } 100% { box-shadow: 0 0 10px rgba(176, 38, 255, 0.2); } }

        .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 1.2em; font-weight: 700; margin-bottom: 20px; padding: 12px 20px; background: rgba(0,0,0,0.6); border-radius: 12px; border: 1px solid rgba(0, 240, 255, 0.2); box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05); color: #fff; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .status-item span { color: var(--neon-cyan); font-size: 1.3em; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); font-weight: 900;}
        
        .ranked-badge { display: none; background: #fbbf24; color: #000; padding: 4px 10px; border-radius: 6px; font-size: 0.6em; vertical-align: middle; margin-right: 5px; box-shadow: 0 0 10px rgba(251, 191, 36, 0.6); font-weight: 900;}

        .question-area { font-size: 3.5em; font-weight: 900; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 15px; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); letter-spacing: 2px; word-break: break-all; }
        
        .flash-font { letter-spacing: 12px !important; }

        .dice-display { font-size: 1.8em; font-weight: 400; color: #e2e8f0; letter-spacing: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); white-space: nowrap; }
        
        .emoji-display { font-size: 1.8em; text-shadow: 0 0 20px rgba(255,255,255,0.2); animation: elasticPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }

        .options-grid { display: grid; gap: 15px; max-width: 320px; margin: 0 auto; grid-template-areas: ". up ." "left . right" ". down ."; }
        .options-grid.vocab-mode { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-areas: ". up up ." "left left right right" ". down down ."; gap: 12px; max-width: 420px; width: 100%; }
        .options-grid.vocab-mode .option-btn { width: 100%; height: 65px; flex-direction: row; justify-content: center; align-items: center; gap: 10px; padding: 5px 15px; }
        .options-grid.vocab-mode .opt-val { font-size: 1.4em; }
        .options-grid.vocab-mode .key-hint { margin-top: 0; position: static; }

        .option-btn { width: 100%; height: 85px; margin: 0; background: rgba(0, 0, 0, 0.4); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: none; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.15s; position: relative;}
        .option-btn .opt-val { font-size: 1.6em; font-weight: 900; }
        .option-btn:hover { background: rgba(0, 240, 255, 0.15); border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.1); transform: scale(1.03); }
        .option-btn:active { transform: scale(0.98); box-shadow: none; }
        .opt-up { grid-area: up; } .opt-left { grid-area: left; } .opt-right { grid-area: right; } .opt-down { grid-area: down; }
        .key-hint { font-size: 0.6em; color: #718096; margin-top: 4px; font-weight: 700; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; border: 1px solid #4a5568;}

        #memory-ui, #random-code-ui, #vocab-ui, #make24-ui, #highcard-ui { display: none; width: 100%; text-align: center; }
        .memory-input-box { font-size: 2.5em; font-weight: 900; letter-spacing: 8px; color: var(--neon-cyan); background: rgba(0,0,0,0.5); border: 2px dashed var(--neon-cyan); border-radius: 12px; width: 85%; margin: 0 auto 20px auto; min-height: 65px; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 10px var(--neon-cyan); box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1); }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 300px; margin: 0 auto; transition: opacity 0.2s; }
        .num-btn { width: 100%; height: 65px; margin: 0; font-size: 1.8em; font-weight: 900; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; }
        .num-btn:hover { background: rgba(0, 240, 255, 0.15); border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        .num-btn.action-btn { color: var(--neon-pink); border-color: rgba(255, 0, 85, 0.3); }
        .num-btn.action-btn:hover { background: rgba(255, 0, 85, 0.15); border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);}
        .num-btn.submit-btn { background: rgba(0, 255, 102, 0.1); color: var(--neon-green); border-color: var(--neon-green); }
        .num-btn.submit-btn:hover { background: rgba(0, 255, 102, 0.2); box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }

        #rc-input { font-size: 1.8em; font-weight: 900; letter-spacing: 5px; color: var(--neon-cyan); background: rgba(0,0,0,0.6); border: 2px solid #4a5568; border-radius: 12px; width: 90%; max-width: 300px; margin: 0 auto 20px auto; padding: 15px; text-align: center; outline: none; box-sizing: border-box; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: all 0.2s; text-shadow: 0 0 5px var(--neon-cyan);}
        #rc-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.1); }
        
        .vocab-word { background: rgba(0,0,0,0.5); color: #fff; padding: 12px 20px; border-radius: 10px; font-weight: 900; font-size: 1.4em; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(255,255,255,0.05); }
        #vocab-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 30px; padding: 0 10px; }

        body.flash-correct { box-shadow: inset 0 0 40px rgba(0, 255, 102, 0.2); background-color: var(--correct-color); }
        body.flash-wrong { box-shadow: inset 0 0 40px rgba(255, 0, 85, 0.2); background-color: var(--wrong-color); }

        .upload-form, .leaderboard-panel { 
            background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(0, 240, 255, 0.2); margin-bottom: 20px; display: none; 
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05);
        }
        .leaderboard-panel { display: block; margin-top: 15px; padding: 15px 10px;}
        .form-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
        select, input[type="number"] { 
            padding: 12px; font-size: 1.1em; font-weight: 700; color: #fff;
            border-radius: 8px; border: 1px solid #4a5568; outline: none; 
            text-align: center; font-family: inherit; background: rgba(0,0,0,0.8);
            transition: all 0.2s;
        }
        select:focus, input:focus { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(176, 38, 255, 0.3); }

        .lb-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px; padding: 10px 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .lb-rank { font-size: 1.2em; font-weight: bold; color: #fbbf24; width: 30px;}
        .lb-name { color: var(--neon-cyan); flex-grow: 1; text-align: left; margin-left: 10px; font-weight: bold;}
        .lb-score { color: var(--neon-pink); font-size: 1.3em; font-weight: bold; text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);}

        /* 合24 專屬樣式 */
        .m24-cards-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; min-height: 85px;}
        .m24-card { 
            width: 70px; height: 85px; display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; border: 2px solid rgba(255,255,255,0.4); font-size: 1.8em; font-weight: bold; 
            background: rgba(0,0,0,0.6); cursor: pointer; transition: all 0.2s; 
        }
        .m24-card:hover { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); transform: translateY(-3px);}
        .m24-card.selected { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); transform: scale(1.1); color: var(--neon-pink);}
        
        .m24-ops-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .m24-op-btn { width: 60px; height: 60px; font-size: 1.8em; padding: 0; margin: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .m24-op-btn.selected { background: rgba(0, 240, 255, 0.3); border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); color: #fff;}

        /* 比大小 專屬樣式 */
        .hc-row { display: flex; justify-content: center; gap: 10px; min-height: 75px; margin-bottom: 10px;}
        .hc-card { 
            width: 55px; height: 75px; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; border: 2px solid rgba(255,255,255,0.4); font-size: 1.6em; font-weight: bold; 
            background: rgba(0,0,0,0.6); cursor: pointer; transition: all 0.2s; 
        }
        .hc-sys-card { border-color: rgba(255, 0, 85, 0.5); color: #fff; cursor: default; background: rgba(255, 0, 85, 0.05); }
        .hc-slot { border: 2px dashed rgba(0, 240, 255, 0.4); background: rgba(0, 240, 255, 0.05); color: transparent; }
        .hc-hand-card { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .hc-hand-card:hover { box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); transform: translateY(-3px); }
        .hc-card.selected { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); transform: scale(1.1); color: var(--neon-pink); }
        
        /* 說明視窗專屬 */
        .instruction-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); padding: 20px; border-radius: 12px; margin-bottom: 25px; text-align: left; line-height: 1.6; color: #e2e8f0;}
        /* --- 數字急轉彎 專用樣式 --- */
        .nst-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            text-align: center;
            position: absolute;
            top: 0; left: 0;
            background-color: var(--bg-dark);
            z-index: 100; /* 確保覆蓋在原本網頁之上 */
        }
        .nst-active { display: flex !important; }
        
        /* --- 數字急轉彎 新增樣式 (按鈕排版、隱藏、特效) --- */
        .nst-menu-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; width: 100%; max-width: 600px; }
        .nst-btn-small { padding: 10px 15px; font-size: 1.1rem; width: auto; flex-grow: 1; }
        .nst-custom-row { align-items: center; }
        #nst-custom-time { 
            padding: 10px; font-size: 1.1rem; border-radius: 5px; border: 1px solid var(--neon-cyan); 
            background: rgba(0,0,0,0.5); color: white; width: 200px; text-align: center;
        }
        .nst-hidden { display: none !important; }
        
        /* 提示發光特效 */
        .nst-hint-glow { 
            box-shadow: 0 0 20px 5px rgba(241, 196, 15, 0.8) !important; 
            animation: nstPulseGlow 1s infinite alternate; 
            border: 2px solid #f1c40f !important;
        }
        @keyframes nstPulseGlow { 
            from { box-shadow: 0 0 10px 2px rgba(241, 196, 15, 0.8); }

        #nst-board {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 900px;
            height: 100%;

        }

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .nst-ai-area { background-color: rgba(245, 166, 35, 0.1); border-bottom: 2px solid rgba(255,255,255,0.1); flex: 1; justify-content: center;}
        .nst-center-area { background-color: rgba(255, 255, 255, 0.05); flex: 1.2; justify-content: center; }
        .nst-player-area { background-color: rgba(126, 211, 33, 0.1); border-top: 2px solid rgba(255,255,255,0.1); flex: 1.5; justify-content: center;}

        .nst-status-text { font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .nst-cards-container {
            display: flex; gap: 12px; min-height: 120px; align-items: center; flex-wrap: wrap; justify-content: center;
        }

        /* 卡牌樣式 */
        .nst-card {
            width: 80px; height: 120px; border-radius: 10px; display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.4); font-weight: bold; user-select: none; transition: transform 0.1s;
        }

    <script>
// ================= 數字急轉彎 (NST) 核心邏輯 =================

// 進入數字急轉彎的入口函數
function enterNST() {
    // 隱藏原本的 app 框架與畫面
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('app').style.display = 'none';
    nstNavTo('nst-menu');
}

// 畫面切換輔助函數 (整合了與舊系統的銜接)
function nstNavTo(screenId) {
    document.querySelectorAll('.nst-screen').forEach(s => s.classList.remove('nst-active'));
    
    if (screenId === 'main-lobby') {
        // 返回主系統
        document.getElementById('app').style.display = 'block';
        // 觸發原有的導航功能
        if(typeof nav === 'function') nav('screen-main');
        else document.getElementById('screen-main').classList.add('active');
        return;
    }
    
    let target = document.getElementById(screenId);
    if(target) target.classList.add('nst-active');
}

let nst_aiIntervalTime = 4000;
let nst_aiTimer = null;
let nst_isGameOver = false;
let nst_isTutorial = false;
let nst_hintTimer = null;
let nst_centerCard = null;
let nst_playerState = { hand: [], deck: [] };
let nst_aiState = { hand: [], deck: [] };

// 根據 mod 決定卡牌底色
function getCardColor(mod) {
    if (mod === 1) return '#27ae60'; 
    if (mod === 2) return '#2980b9'; 
    if (mod === 3) return '#c0392b'; 
    return '#7f8c8d';
}

function nstGenerateDeck() {
    let deck = [];
    for (let i = 0; i < 73; i++) {
        deck.push({ num: Math.floor(Math.random() * 10) + 1, mod: Math.floor(Math.random() * 3) + 1 });
    }
    return deck;
}

function startNST(difficulty) {
    nst_isTutorial = false;
    document.querySelector('.nst-ai-area').classList.remove('nst-hidden'); // 顯示電腦區域
    nst_aiIntervalTime = difficulty;
    nst_isGameOver = false;
    
    let allCards = nstGenerateDeck();
    for (let i = allCards.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
    }
    
    nst_playerState.deck = allCards.splice(0, 36);
    nst_aiState.deck = allCards.splice(0, 36);
    nst_centerCard = allCards.splice(0, 1)[0];

    nst_playerState.hand = nst_playerState.deck.splice(0, 5);
    nst_aiState.hand = nst_aiState.deck.splice(0, 5);

    nstNavTo('nst-game');
    updateNSTUI();
    triggerNSTAI();
}

function quitNST() {
    nst_isGameOver = true;
    clearTimeout(nst_aiTimer);
    nstNavTo('nst-menu');
}

function nstGetValidTargets(card) {
    let t1 = ((card.num + card.mod - 1) % 10) + 1;
    let t2 = ((card.num - card.mod - 1 + 10) % 10) + 1;
    return [t1, t2];
}

function nstIsValidPlay(playCard, currentCenter) {
    let targets = nstGetValidTargets(currentCenter);
    return playCard.num === targets[0] || playCard.num === targets[1];
}

function nstPlayerDraw() {
    if (nst_isGameOver || nst_playerState.hand.length >= 7 || nst_playerState.deck.length === 0) return;
    nst_playerState.hand.push(nst_playerState.deck.shift());
    updateNSTUI();
    checkNSTDeadlock(); // 每次抽牌後檢查死局
}

function nstPlayerPlay(handIndex) {
    if (nst_isGameOver) return;
    let card = nst_playerState.hand[handIndex];
    if (nstIsValidPlay(card, nst_centerCard)) {
        nst_centerCard = nst_playerState.hand.splice(handIndex, 1)[0];
        checkNSTWinCondition();
        updateNSTUI();
        checkNSTDeadlock(); // 每次出牌後檢查死局
        
        // 如果遊戲還沒結束且不是教學模式，重啟電腦計時器
        if(!nst_isGameOver && !nst_isTutorial) triggerNSTAI(); 
    }
}

function nstPlayerReshuffle() {
    if (nst_isGameOver) return;
    let targets = nstGetValidTargets(nst_centerCard);
    let hasValid = nst_playerState.hand.some(c => c.num === targets[0] || c.num === targets[1]);
    
    if (nst_playerState.hand.length === 7 || (nst_playerState.deck.length === 0 && !hasValid)) {
        nstReshuffleLogic(nst_playerState);
        updateNSTUI();
        checkNSTDeadlock(); // 每次重洗後檢查死局
    }
}

function nstReshuffleLogic(stateObj) {
    stateObj.deck = stateObj.deck.concat(stateObj.hand);
    stateObj.hand = [];
    for (let i = stateObj.deck.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [stateObj.deck[i], stateObj.deck[j]] = [stateObj.deck[j], stateObj.deck[i]];
    }
    let drawCount = Math.min(7, stateObj.deck.length);
    stateObj.hand = stateObj.deck.splice(0, drawCount);
}

function triggerNSTAI() {
    if (nst_isGameOver) return;
    clearTimeout(nst_aiTimer);
    nst_aiTimer = setTimeout(nstAiAction, nst_aiIntervalTime);
}

function nstAiAction() {
    if (nst_isGameOver || nst_isTutorial) return;
    
    let played = false;
    for (let i = 0; i < nst_aiState.hand.length; i++) {
        if (nstIsValidPlay(nst_aiState.hand[i], nst_centerCard)) {
            nst_centerCard = nst_aiState.hand.splice(i, 1)[0];
            played = true; break;
        }
    }

    if (played) {
        checkNSTWinCondition();
        updateNSTUI();
        checkNSTDeadlock(); // AI出牌後檢查死局
        if (!nst_isGameOver) triggerNSTAI();
    } else {
        if (nst_aiState.hand.length < 7 && nst_aiState.deck.length > 0) {
            nst_aiState.hand.push(nst_aiState.deck.shift());
            updateNSTUI();
            checkNSTDeadlock(); // AI抽牌後檢查死局
            triggerNSTAI();
        } else if (nst_aiState.hand.length === 7 || nst_aiState.deck.length === 0) {
            nstReshuffleLogic(nst_aiState);
            updateNSTUI();
            checkNSTDeadlock(); // AI重洗後檢查死局
            triggerNSTAI();
        } else {
            // AI卡住無法動彈時，也要檢查是否符合死局條件
            checkNSTDeadlock(); 
            triggerNSTAI();
        }
    }
}

function checkNSTWinCondition() {
    let playerTotal = nst_playerState.hand.length + nst_playerState.deck.length;
    
    // 如果是教學模式，只判定玩家是否出完牌
    if (nst_isTutorial) {
        if (playerTotal === 0) {
            endNSTGame("🎉 恭喜完成教學模式！🎉");
        }
        return; // 直接返回，不執行下方電腦勝出的判定
    }

    // 正常對戰模式的判定
    let aiTotal = nst_aiState.hand.length + nst_aiState.deck.length;
    if (playerTotal === 0) endNSTGame("🎉 玩家獲勝！🎉");
    else if (aiTotal === 0) endNSTGame("🤖 電腦獲勝！🤖");
}

function endNSTGame(msg) {
    nst_isGameOver = true;
    clearTimeout(nst_aiTimer);
    nstNavTo('nst-result');
    let textObj = document.getElementById('nst-result-text');
    textObj.innerText = msg;
    textObj.style.color = msg.includes("玩家") ? "#00ff66" : "#ff0055";
}

function nstCreateCardElement(card, isPlayable, onClickFunc = null) {
    let div = document.createElement('div');
    div.className = isPlayable ? 'nst-card nst-card-playable' : 'nst-card';
    div.style.backgroundColor = getCardColor(card.mod);
    div.innerHTML = `<div class="nst-main-num">${card.num}</div><div class="nst-modifier">±${card.mod}</div>`;
    if (onClickFunc) div.onclick = onClickFunc;
    return div;
}

function updateNSTUI() {
    let targets = nstGetValidTargets(nst_centerCard);
    document.getElementById('nst-target-nums').innerText = `${targets[0]} 或 ${targets[1]}`;

    let centerContainer = document.getElementById('nst-center-pile');
    centerContainer.innerHTML = '';
    let centerEl = nstCreateCardElement(nst_centerCard, false);
    centerEl.classList.add('nst-center-card');
    centerContainer.appendChild(centerEl);

    let pHandDiv = document.getElementById('nst-player-hand');
    pHandDiv.innerHTML = '';
    nst_playerState.hand.forEach((card, index) => {
        let cardEl = nstCreateCardElement(card, true, () => nstPlayerPlay(index));
        pHandDiv.appendChild(cardEl);
    });

    let aiHandDiv = document.getElementById('nst-ai-hand');
    aiHandDiv.innerHTML = '';
    nst_aiState.hand.forEach(() => {
        let div = document.createElement('div');
        div.className = 'nst-card nst-card-back';
        aiHandDiv.appendChild(div);
    });

    document.getElementById('nst-player-total').innerText = nst_playerState.hand.length + nst_playerState.deck.length;
    document.getElementById('nst-ai-total').innerText = nst_aiState.hand.length + nst_aiState.deck.length;

    let pDeckUI = document.getElementById('nst-player-deck-ui');
    pDeckUI.style.opacity = nst_playerState.deck.length > 0 ? 1 : 0.3;
    pDeckUI.style.pointerEvents = nst_playerState.deck.length > 0 ? 'auto' : 'none';
    document.getElementById('nst-ai-deck-ui').style.opacity = nst_aiState.deck.length > 0 ? 1 : 0.3;

    let pHasValid = nst_playerState.hand.some(c => c.num === targets[0] || c.num === targets[1]);
    let btnReshuffle = document.getElementById('nst-btn-reshuffle');
    btnReshuffle.disabled = !(nst_playerState.hand.length === 7 || (nst_playerState.deck.length === 0 && !pHasValid));
    btnReshuffle.style.borderColor = btnReshuffle.disabled ? "#4a5568" : "#00f0ff";
    btnReshuffle.style.color = btnReshuffle.disabled ? "#718096" : "#00f0ff";
    
    const originalUpdateNSTUI = updateNSTUI;
    updateNSTUI = function() {
    originalUpdateNSTUI();
    resetNSTHintTimer(); // 每次畫面更新，重新計算5秒提示
};
}

function startCustomNSTPopup() {
    // 使用 prompt 讓玩家輸入秒數
    let inputStr = prompt("請輸入電腦每隔多少秒出牌/抽牌一次 (例如: 1.5):", "1.5");
    if (inputStr === null) return; // 玩家按下取消
    
    let seconds = parseFloat(inputStr);
    if (isNaN(seconds) || seconds <= 0) { 
        alert('請輸入有效的秒數 (大於 0)'); 
        return; 
    }
    
    // 將秒數轉換為毫秒並開始遊戲
    startNST(seconds * 1000);
}

function startNSTTutorial() {
    nst_isTutorial = true;
    nst_isGameOver = false;
    let allCards = nstGenerateDeck();
    
    // 洗牌
    for (let i = allCards.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
    }
    
    // 教學模式：抽取 1 張中央牌，以及 20 張玩家牌 (總數20張)
    nst_centerCard = allCards.splice(0, 1)[0];
    nst_playerState.deck = allCards.splice(0, 20); 
    
    // 清空電腦手牌與牌庫
    nst_aiState.deck = [];
    nst_aiState.hand = [];
    
    // 玩家抽起始 5 張手牌
    nst_playerState.hand = nst_playerState.deck.splice(0, 5);

    document.querySelector('.nst-ai-area').classList.add('nst-hidden');
    nstNavTo('nst-game');
    updateNSTUI();
    
    // 重置並啟動提示計時器
    if (typeof resetNSTHintTimer === 'function') resetNSTHintTimer();
}

// 提示系統計時器
function resetNSTHintTimer() {
    clearTimeout(nst_hintTimer);
    if (nst_isTutorial && !nst_isGameOver) {
        nst_hintTimer = setTimeout(showNSTHints, 5000); // 5秒未出牌顯示提示
    }
}

function showNSTHints() {
    if (nst_isGameOver || !nst_isTutorial) return;
    let targets = nstGetValidTargets(nst_centerCard);
    let handEls = document.getElementById('nst-player-hand').children;
    nst_playerState.hand.forEach((card, idx) => {
        if (card.num === targets[0] || card.num === targets[1]) {
            if (handEls[idx]) handEls[idx].classList.add('nst-hint-glow');
        }
    });
}

// 檢查是否雙方皆無牌可出且牌庫為空
function checkNSTDeadlock() {
    if (nst_isGameOver) return;

    // 情況 1：絕對死局 (雙方「手牌+牌庫」所有的牌加起來，都沒有可以出的牌)
    let pAllCards = [...nst_playerState.hand, ...nst_playerState.deck];
    let pHasAnyValid = pAllCards.some(c => nstIsValidPlay(c, nst_centerCard));
    
    let aHasAnyValid = false;
    if (!nst_isTutorial) {
        let aAllCards = [...nst_aiState.hand, ...nst_aiState.deck];
        aHasAnyValid = aAllCards.some(c => nstIsValidPlay(c, nst_centerCard));
    }
    let absoluteDeadlock = !pHasAnyValid && !aHasAnyValid;

    // 情況 2：空牌庫卡死 (雙方牌庫皆為 0，且手牌都無法出，就算重洗也只會抽回同樣的牌)
    let pHasValidHand = nst_playerState.hand.some(c => nstIsValidPlay(c, nst_centerCard));
    let pEmptyDeckStuck = !pHasValidHand && nst_playerState.deck.length === 0;

    let aEmptyDeckStuck = true; // 預設為 true 以兼容單人教學模式
    if (!nst_isTutorial) {
        let aHasValidHand = nst_aiState.hand.some(c => nstIsValidPlay(c, nst_centerCard));
        aEmptyDeckStuck = !aHasValidHand && nst_aiState.deck.length === 0;
    }

    // 當發生任一死局情況時，系統強制介入救援！
    if (absoluteDeadlock || (pEmptyDeckStuck && aEmptyDeckStuck)) {
        console.log("🔄 偵測到死局，系統自動發放新牌救援！");
        
        // 生成一張必定能接續當前目標數字的牌
        let targets = nstGetValidTargets(nst_centerCard);
        let newTarget = Math.random() < 0.5 ? targets[0] : targets[1];
        let newMod = Math.floor(Math.random() * 3) + 1;
        nst_centerCard = { num: newTarget, mod: newMod };
        
        // 更新畫面，讓玩家與電腦看到新牌
        updateNSTUI();
    }
}

// 覆蓋玩家重洗，加入死局檢查
const originalNstPlayerReshuffle = nstPlayerReshuffle;
nstPlayerReshuffle = function() {
    originalNstPlayerReshuffle();
    checkNSTDeadlock(); 
};

// 覆蓋電腦行動，加入死局檢查
const originalNstAiAction = nstAiAction;
nstAiAction = function() {
    originalNstAiAction();
    if (nst_aiState.hand.length === 7 || nst_aiState.deck.length === 0) {
        checkNSTDeadlock();
    }
};

</script>
</head>

        <button onclick="actualStartGame()" style="background: rgba(0, 255, 102, 0.1); border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);">🚀 開始遊戲</button>

        <div class="question-area" id="question-display"></div>

        <div class="options-grid" id="options-ui">
            <button class="option-btn opt-up" onclick="submitAnswer(0)"><div class="opt-val" id="opt-0"></div><div class="key-hint">W/↑</div></button>
            <button class="option-btn opt-left" onclick="submitAnswer(1)"><div class="opt-val" id="opt-1"></div><div class="key-hint">A/←</div></button>
            <button class="option-btn opt-right" onclick="submitAnswer(2)"><div class="opt-val" id="opt-2"></div><div class="key-hint">D/→</div></button>
            <button class="option-btn opt-down" onclick="submitAnswer(3)"><div class="opt-val" id="opt-3"></div><div class="key-hint">S/↓</div></button>
        </div>

        <div id="memory-ui">
            <div class="memory-input-box" id="memory-input-display"></div>

<script>
    let currentGameMode = ''; 
    let currentDifficulty = ''; 
    let isRankedMode = false;
    let consecutiveCorrect = 0; 
    let consecutiveWrong = 0; // 新增：連續錯誤計數器
    
    let score = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let currentCorrectAnswer = null;
    let currentOptions = [];
    let isGameActive = false;
    let isPaused = false; 
    let currentMemoryInput = '';
    let vocabQuestionText = '';

    const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
    const faceEmojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','🥲','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎'];

    const alphaNumChars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    const vocabPool = ['公園', '學校', '超市', '醫院', '銀行', '餐廳', '海灘', '車站', '機場', '郵局', '商場', '書店', '戲院', '酒店', '警署', '診所', '花園', '碼頭', '教堂', '廟宇', '蘋果', '香蕉', '西瓜', '葡萄', '草莓', '橙子', '芒果', '櫻桃', '壽司', '拉麵', '漢堡', '披薩', '牛排', '沙律', '火鍋', '燒烤', '炸雞', '薯條', '雪糕', '布丁', '跑步', '游泳', '看書', '聽歌', '畫畫', '跳舞', '打球', '行山', '露營', '拍照', '逛街', '旅行', '騎車', '釣魚', '下棋', '寫字', '唱歌', '網購', '煮飯', '打掃'];

    const gameInstructions = {
        'dice': '🎯 <b>玩法：</b><br>畫面上會出現數顆骰子，請盡快將所有骰子的點數加總，並從四個選項中選出正確的答案。',
        'math': '🎯 <b>玩法：</b><br>畫面上會出現一條數學算式。請在腦中快速算出答案，並從下方選項中選出正確數值。',
        'make24': '🎯 <b>玩法：</b><br>利用加、減、乘、除，將畫面上的四個數字運算得出 <b>24</b>。<br>先點選數字，再點選運算符號，最後點擊另一個數字進行合併。<br><i>* 在高級與達人難度中，可能出現無法組成24的題目，請善用「無法組合」按鈕！</i>',
        'reaction-match': '🎯 <b>玩法：</b><br>畫面上方會出現一個目標圖案。請以最快速度，在下方的四個選項中，找出完全一樣的圖案並點擊。',
        'reaction-direction': '🎯 <b>玩法：</b><br>畫面會給出一個箭頭及文字提示（例如「相同方向」、「相反方向」、「左方」）。請根據提示，在四個選項中選出正確指向的箭頭。',
        'flash-memory': '🎯 <b>玩法：</b><br>畫面上會瞬間閃過一串數字。請將數字記在腦中，當畫面變成「?」時，利用下方數字鍵盤準確輸入該數字並提交。',
        'random-code-memory': '🎯 <b>玩法：</b><br>畫面上會顯示一段由英文字母和數字組成的亂碼。記住它後點擊「開始作答」，憑記憶準確輸入剛才的亂碼。',
        'vocab-memory': '🎯 <b>玩法：</b><br>畫面上會出現數個生活詞彙，請盡量記住它們。<br>隨後會進入答題階段，請根據問題（選出「有出現過」或「沒有出現過」的詞彙）作答。',
        'highcard': '🎯 <b>玩法：</b><br>這是「田忌賽馬」風格的比大小遊戲。敵方的陣型已排列在上方。<br>請依序點擊你的<b>手牌</b>，再點擊你想放置的<b>出牌區位置</b>。也可點擊兩張卡牌進行互換位置。<br>你的目標是讓你在出牌區的卡牌，能在<b>多數位置上大於對應位置的敵方卡牌</b>來贏得勝利！'
    };

    let m24CurrentCards = []; let m24OriginalCards = []; let m24SelCard = -1; let m24SelOp = ''; let m24IsSolvable = true;
    let hcSysCards = []; let hcHandCards = []; let hcSlots = []; let hcSelected = null;

    function nav(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        isGameActive = (screenId === 'screen-game');
    }
    
    function navBackFromDiff() {
        if (currentGameMode.startsWith('reaction')) nav('screen-reaction-menu');
        else if (currentGameMode.includes('memory')) nav('screen-memory-menu');
        else if (currentGameMode === 'highcard') nav('screen-logic-menu');
        else nav('screen-calc-menu');
    }
    
    function selectGame(mode) {
            currentGameMode = mode;
            // 隱藏所有難度選單
            document.getElementById('diff-buttons-standard').style.display = 'none';
            document.getElementById('diff-buttons-math').style.display = 'none'; // 加入這行
            document.getElementById('diff-buttons-reaction').style.display = 'none';
            document.getElementById('diff-buttons-direction').style.display = 'none';
            document.getElementById('diff-buttons-vocab').style.display = 'none';
            document.getElementById('diff-buttons-make24').style.display = 'none';
            document.getElementById('diff-buttons-highcard').style.display = 'none';

            // 根據模式顯示對應選單
            if (mode === 'math') {
                document.getElementById('diff-buttons-math').style.display = 'block';
            } else if (mode === 'dice' || mode === 'flash-memory' || mode === 'random-code-memory') {
                document.getElementById('diff-buttons-standard').style.display = 'block';
            } else if (mode === 'reaction-match') {
                document.getElementById('diff-buttons-reaction').style.display = 'block';
            } else if (mode === 'reaction-direction') {
                document.getElementById('diff-buttons-direction').style.display = 'block';
            } else if (mode === 'vocab-memory') {
                document.getElementById('diff-buttons-vocab').style.display = 'block';
            } else if (mode === 'make24') {
                document.getElementById('diff-buttons-make24').style.display = 'block';
            } else if (mode === 'highcard') {
                document.getElementById('diff-buttons-highcard').style.display = 'block';
            }
            nav('screen-difficulty');
    }

    function startGame(difficulty) {
        if (difficulty === 'ranked') {
            isRankedMode = true;
            currentDifficulty = 'beginner';
            timeLeft = 90; 
            consecutiveCorrect = 0;
            consecutiveWrong = 0;
        } else {
            isRankedMode = false;
            currentDifficulty = difficulty;
            if (currentGameMode === 'make24') timeLeft = 180;
            else if (currentGameMode === 'random-code-memory') timeLeft = 60;
            else timeLeft = 60;
        }
        
        // 顯示遊戲說明視窗
        document.getElementById('inst-desc').innerHTML = gameInstructions[currentGameMode] || '準備好接受挑戰了嗎？';
        nav('screen-instructions');
    }

    // 實際開始計時與載入遊戲內容
    window.actualStartGame = function() {
        score = 0;
        isPaused = false;
        if (isRankedMode) document.getElementById('ranked-badge').style.display = 'inline-block';
        else document.getElementById('ranked-badge').style.display = 'none';

        setupGameUI();
        updateStatus();
        nav('screen-game');
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isGameActive && !isPaused) {
                timeLeft--;
                updateStatus();
                if (timeLeft <= 0) endGame();
            }
        }, 1000);

        nextQuestion();
    }

    function setupGameUI() {
        document.getElementById('options-ui').style.display = 'none';
        document.getElementById('memory-ui').style.display = 'none';
        document.getElementById('random-code-ui').style.display = 'none';
        document.getElementById('vocab-ui').style.display = 'none';
        document.getElementById('make24-ui').style.display = 'none';
        document.getElementById('highcard-ui').style.display = 'none';
        document.getElementById('question-display').style.display = 'flex';
        
        document.getElementById('options-ui').classList.remove('vocab-mode'); 
        document.getElementById('question-display').classList.remove('flash-font');
        document.getElementById('memory-input-display').classList.remove('flash-font');

        if (currentGameMode === 'flash-memory') {
            document.getElementById('memory-ui').style.display = 'block';
            document.getElementById('question-display').classList.add('flash-font');
            document.getElementById('memory-input-display').classList.add('flash-font');
        }
        else if (currentGameMode === 'random-code-memory') document.getElementById('random-code-ui').style.display = 'block';
        else if (currentGameMode === 'vocab-memory') document.getElementById('vocab-ui').style.display = 'block';
        else if (currentGameMode === 'make24') {
            document.getElementById('make24-ui').style.display = 'block';
            document.getElementById('question-display').style.display = 'none';
            document.getElementById('m24-impossible-btn').style.display = (currentDifficulty === 'advanced' || currentDifficulty === 'elite') ? 'inline-block' : 'none';
        }
        else if (currentGameMode === 'highcard') {
            document.getElementById('highcard-ui').style.display = 'block';
            document.getElementById('question-display').style.display = 'none';
        }
        else document.getElementById('options-ui').style.display = 'grid';
    }

    function abortGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        navBackFromDiff();
    }

    function updateStatus() {
        document.getElementById('score-display').innerText = score;
        document.getElementById('time-display').innerText = timeLeft;
        
        if (isRankedMode) {
            const diffMap = { 'beginner': '初級', 'intermediate': '中級', 'advanced': '高級', 'elite': '達人' };
            document.getElementById('ranked-badge').innerText = `${diffMap[currentDifficulty]} (${consecutiveCorrect}/5)`;
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        document.getElementById('final-score').innerText = score;
        
        if (isRankedMode) {
            document.getElementById('upload-section').style.display = 'block';
            try {
                if (localStorage.getItem('studentGrade')) document.getElementById('student-grade').value = localStorage.getItem('studentGrade');
                if (localStorage.getItem('studentClass')) document.getElementById('student-class').value = localStorage.getItem('studentClass');
                if (localStorage.getItem('studentId')) document.getElementById('student-id').value = parseInt(localStorage.getItem('studentId'), 10);
            } catch (error) {}
        } else {
            document.getElementById('upload-section').style.display = 'none';
        }
        
        nav('screen-result');
    }

    function triggerFeedback(isCorrect) {
        const app = document.getElementById('app');
        document.body.classList.remove('flash-correct', 'flash-wrong');
        app.classList.remove('shake', 'pop');
        void document.body.offsetWidth; 

        if (isCorrect) { 
            consecutiveWrong = 0; // 重置連續錯誤
            if (isRankedMode) {
                const pointsMap = { 'beginner': 1, 'intermediate': 2, 'advanced': 3, 'elite': 4 };
                score += pointsMap[currentDifficulty] || 1;
                consecutiveCorrect++;
                // 升級機制
                if (consecutiveCorrect >= 5) {
                    if (currentDifficulty === 'beginner') currentDifficulty = 'intermediate';
                    else if (currentDifficulty === 'intermediate') currentDifficulty = 'advanced';
                    else if (currentDifficulty === 'advanced') currentDifficulty = 'elite';
                    consecutiveCorrect = 0; 
                }
            } else { score++; }
            document.body.classList.add('flash-correct'); app.classList.add('pop'); 
        } else { 
            score--; 
            consecutiveCorrect = 0; 
            if (isRankedMode) {
                consecutiveWrong++;
                // 連錯 3 題降級機制
                if (consecutiveWrong >= 3) {
                    if (currentDifficulty === 'elite') currentDifficulty = 'advanced';
                    else if (currentDifficulty === 'advanced') currentDifficulty = 'intermediate';
                    else if (currentDifficulty === 'intermediate') currentDifficulty = 'beginner';
                    consecutiveWrong = 0;
                }
            }
            document.body.classList.add('flash-wrong'); app.classList.add('shake'); 
        }
        
        setTimeout(() => { 
            document.body.classList.remove('flash-correct', 'flash-wrong'); 
            app.classList.remove('shake', 'pop');
        }, 400); 
        updateStatus();
    }

    async function uploadScore() {
        const grade = document.getElementById('student-grade').value;
        const cls = document.getElementById('student-class').value;
        const sIdRaw = document.getElementById('student-id').value;
        
        if (!grade || !cls || !sIdRaw) return alert('⚠️ 請填寫完整的 年級、班別 與 學號！');
        
        // 確保學號為整數，4 與 04 都會轉成 4，存儲一致
        const sId = parseInt(sIdRaw, 10);

        try { localStorage.setItem('studentGrade', grade); localStorage.setItem('studentClass', cls); localStorage.setItem('studentId', sId); } catch (e) {}

        if (!window.db) return alert("⚠️ 數據庫連線異常。");

        try {
            const btn = document.querySelector('.upload-form button');
            btn.disabled = true; btn.innerText = "提交中...";
            await window.addDoc(window.collection(window.db, "leaderboard"), {
                gameMode: currentGameMode, score: score, grade: grade,
                studentClass: cls, studentId: sId, timestamp: window.serverTimestamp()
            });
            alert('✅ 成績提交成功！');
            document.getElementById('upload-section').style.display = 'none';
        } catch (error) {
            alert('❌ 提交失敗：' + error.message);
            const btn = document.querySelector('.upload-form button');
            btn.disabled = false; btn.innerText = "重新提交";
        }
    }

    async function fetchLeaderboard() {
        if (!window.db || !window.getDocs) return alert("⚠️ Firebase 系統尚未連線");
        const grade = document.getElementById('lb-grade').value;
        const mode = document.getElementById('lb-mode').value;
        const resultsDiv = document.getElementById('lb-results');
        
        resultsDiv.innerHTML = '<div style="text-align:center; padding: 20px;"><div style="color:var(--neon-cyan); font-size: 1.2em;">正在搜尋排行榜...</div></div>';
        
        try {
            let q;
            if (grade === "all") {
                // 如果選全校，僅以遊戲模式查詢
                q = window.query(window.collection(window.db, "leaderboard"), window.where("gameMode", "==", mode));
            } else {
                q = window.query(window.collection(window.db, "leaderboard"), window.where("grade", "==", grade), window.where("gameMode", "==", mode));
            }

            const querySnapshot = await window.getDocs(q);
            let docs = [];
            querySnapshot.forEach(doc => docs.push(doc.data()));
            
            // 過濾同一學生的最高分：利用 grade-class-id 做為唯一鍵值
            let studentBest = {};
            docs.forEach(data => {
                let sId = parseInt(data.studentId, 10);
                let key = `${data.grade}-${data.studentClass}-${sId}`;
                if (!studentBest[key] || data.score > studentBest[key].score) {
                    studentBest[key] = data;
                }
            });
            
            docs = Object.values(studentBest);
            
            // 排序並取前 10
            docs.sort((a, b) => b.score - a.score);
            docs = docs.slice(0, 10);
            
            if(docs.length === 0) { resultsDiv.innerHTML = "<div style='text-align:center; padding: 20px; color:#718096;'>未發現任何成績紀錄</div>"; return; }

            let html = "";
            docs.forEach((data, index) => {
                let rankColor = index === 0 ? '#fbbf24' : index === 1 ? '#e2e8f0' : index === 2 ? '#b45309' : '#4a5568';
                let displayId = String(data.studentId).padStart(2, '0'); // 自動補零，如 3 變成 03
                html += `
                <div class="lb-item">
                    <div class="lb-rank" style="color: ${rankColor};">${index + 1}</div>
                    <div class="lb-name">[${data.grade}${data.studentClass} ${displayId}]</div>
                    <div class="lb-score">${data.score}</div>
                </div>`;
            });
            resultsDiv.innerHTML = html;
        } catch (e) {
            resultsDiv.innerHTML = `<div style="color: var(--neon-pink); text-align:center;">查詢失敗: ${e.message}</div>`;
        }
    }

    function nextQuestion() {
        if (currentGameMode === 'flash-memory') return handleFlashMemoryFlow();
        if (currentGameMode === 'random-code-memory') return handleRandomCodeFlow();
        if (currentGameMode === 'vocab-memory') return handleVocabMemoryFlow();
        if (currentGameMode === 'make24') return handleMake24Flow();
        if (currentGameMode === 'highcard') return handleHighCardFlow();

        let logicDiff = (currentDifficulty === 'elite' && (currentGameMode === 'reaction-match' || currentGameMode === 'reaction-direction' || currentGameMode === 'make24')) ? 'advanced' : currentDifficulty;
        let questionData;

        if (currentGameMode === 'dice') { questionData = generateDiceQuestion(logicDiff); currentOptions = generateMathOptions(questionData.answer); }

    // --- 比大小遊戲邏輯 ---
    function handleHighCardFlow() {
        let diff = isRankedMode ? (currentDifficulty === 'elite' ? 'elite' : currentDifficulty) : currentDifficulty;
        let k, sysIndices, pIndices, min, max;
        
        if (diff === 'beginner') { k = 6; sysIndices = [0, 2, 4]; pIndices = [1, 3, 5]; min = 1; max = 10; }
        else if (diff === 'intermediate') { k = 6; sysIndices = [1, 3, 5]; pIndices = [0, 2, 4]; min = 1; max = 20; }
        else if (diff === 'advanced') { k = 10; sysIndices = [0, 2, 4, 6, 9]; pIndices = [1, 3, 5, 7, 8]; min = 11; max = 50; }
        else { k = 10; sysIndices = [0, 2, 4, 8, 9]; pIndices = [1, 3, 5, 6, 7]; min = 30; max = 99; }
        
        let nums = new Set();
        while(nums.size < k) nums.add(Math.floor(Math.random() * (max - min + 1)) + min);
        let sorted = Array.from(nums).sort((a, b) => a - b);
        
        hcSysCards = sysIndices.map(i => sorted[i]);
        let pCards = pIndices.map(i => sorted[i]);
        
        hcSysCards.sort(() => Math.random() - 0.5);
        pCards.sort(() => Math.random() - 0.5);
        
        hcHandCards = pCards;

        renderHighCardUI();

    window.clickHcCard = function(type, idx) {

    function evalHighCard() {
        let pWins = 0; let sysWins = 0;
        for(let i = 0; i < hcSysCards.length; i++) {
            if(hcSlots[i] > hcSysCards[i]) pWins++;

    function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while(b) { let t = b; b = a % b; a = t; } return a; }
    function simplifyFraction(n, d) {
        if (d === 0) return null;
        if (n === 0) return {n:0, d:1};
        let g = gcd(n, d); n /= g; d /= g;
        if (d < 0) { n = -n; d = -d; }
        return { n, d };
    }
    function opFractions(f1, f2, op) {
        let n, d;
        if (op === '+') { n = f1.n*f2.d + f2.n*f1.d; d = f1.d*f2.d; }
        if (op === '-') { n = Math.abs(f1.n*f2.d - f2.n*f1.d); d = f1.d*f2.d; }
        if (op === '*') { n = f1.n*f2.n; d = f1.d*f2.d; }
        if (op === '/') { n = f1.n*f2.d; d = f1.d*f2.n; }
        return simplifyFraction(n, d);
    }
    function formatFraction(f) { return f.d === 1 ? f.n.toString() : `${f.n}/${f.d}`; }
    function solve24(arr, requireInt = false) {
        if (arr.length === 1) return Math.abs(arr[0].n / arr[0].d - 24) < 1e-5;
        for (let i=0; i<arr.length; i++) {
            for (let j=0; j<arr.length; j++) {
                if (i === j) continue;
                let rest = [];
                for (let k=0; k<arr.length; k++) if (k!==i && k!==j) rest.push(arr[k]);
                let ops = ['+', '-', '*', '/'];
                for (let op of ops) {
                    if (op === '/' && arr[j].n === 0) continue;
                    let res = opFractions(arr[i], arr[j], op);
                    if (!res) continue;
                    if (requireInt && res.d !== 1) continue; 
                    if (solve24([...rest, res], requireInt)) return true;
                }
            }
        }
        return false;
    }

    function handleMake24Flow() {
        let requireInt = (currentDifficulty === 'beginner' || currentDifficulty === 'intermediate'); 
        let makeUnsolvable = ((currentDifficulty === 'advanced' || currentDifficulty === 'elite') && Math.random() < 0.2);
        let cards = [];
        let attempts = 0;
        
        while (true) {
            cards = Array.from({length:4}, () => ({ n: Math.floor(Math.random()*10)+1, d: 1 }));
            let isSolvable = solve24(cards, requireInt);
            if (makeUnsolvable && !solve24(cards, false)) break; 
            if (!makeUnsolvable && isSolvable) break; 
            attempts++;
            if (attempts > 1000) requireInt = false; 
        }
        
        m24IsSolvable = !makeUnsolvable;
        m24OriginalCards = [...cards];
        resetM24State();
    }

    function resetM24State() { m24CurrentCards = [...m24OriginalCards]; m24SelCard = -1; m24SelOp = ''; renderM24UI(); }
    function resetM24() { resetM24State(); }
    function skipM24() { timeLeft -= 5; if(timeLeft<0) timeLeft=0; updateStatus(); nextQuestion(); }
    function guessM24Impossible() { triggerFeedback(!m24IsSolvable); setTimeout(() => { nextQuestion(); }, 200); }

    function renderM24UI() {
        let html = '';
        m24CurrentCards.forEach((c, idx) => {
            let selClass = (idx === m24SelCard) ? 'selected' : '';
            html += `<div class="m24-card ${selClass}" onclick="clickM24Card(${idx})">${formatFraction(c)}</div>`;
        });
        document.getElementById('m24-cards-container').innerHTML = html;

        ['+', '-', '*', '/'].forEach(op => {
            let btn = document.getElementById(`op-btn-${op}`);
            if(m24SelOp === op) btn.classList.add('selected');
            else btn.classList.remove('selected');
        });
    }

    function selectM24Op(op) { if (m24SelCard !== -1) { m24SelOp = (m24SelOp === op) ? '' : op; renderM24UI(); } }

    function clickM24Card(idx) {
        if (m24SelCard === -1) { m24SelCard = idx; } 
        else if (m24SelCard === idx) { m24SelCard = -1; } 
        else {
            if (m24SelOp !== '') {
                let res = opFractions(m24CurrentCards[m24SelCard], m24CurrentCards[idx], m24SelOp);
                if (!res) return; 
                let newCards = [];
                for(let i=0; i<m24CurrentCards.length; i++) { if (i !== m24SelCard && i !== idx) newCards.push(m24CurrentCards[i]); }
                newCards.push(res);
                m24CurrentCards = newCards;
                m24SelCard = -1; m24SelOp = '';
                renderM24UI(); checkM24End(); return;
            } else { m24SelCard = idx; }
        }
        renderM24UI();
    }

    function checkM24End() {
        if (m24CurrentCards.length === 1) {
            let finalVal = m24CurrentCards[0];
            if (finalVal.n === 24 && finalVal.d === 1) { triggerFeedback(true); setTimeout(() => nextQuestion(), 200); } 
            else { triggerFeedback(false); setTimeout(() => nextQuestion(), 400); }
        }

    function handleVocabMemoryFlow() {
        let diff = currentDifficulty === 'elite' ? 'elite' : currentDifficulty;
        let count = (diff === 'beginner') ? 4 : (diff === 'intermediate') ? 6 : (diff === 'advanced') ? 8 : 10;
        let tempPool = [...vocabPool], selectedWords = [];
        for(let i = 0; i < count; i++) { let idx = Math.floor(Math.random() * tempPool.length); selectedWords.push(tempPool[idx]); tempPool.splice(idx, 1); }
        let qType = 'has';
        if ((diff === 'advanced' || diff === 'elite') && Math.random() > 0.5) qType = 'hasNot';

        let opts = [], ans = '';
        if (qType === 'has') {
            ans = selectedWords[Math.floor(Math.random() * selectedWords.length)]; opts.push(ans);
            for(let i = 0; i < 3; i++) { let idx = Math.floor(Math.random() * tempPool.length); opts.push(tempPool[idx]); tempPool.splice(idx, 1); }
        } else {
            let tempSelected = [...selectedWords];
            for(let i = 0; i < 3; i++) { let idx = Math.floor(Math.random() * tempSelected.length); opts.push(tempSelected[idx]); tempSelected.splice(idx, 1); }
            ans = tempPool[Math.floor(Math.random() * tempPool.length)]; opts.push(ans);
        }
        for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
        currentCorrectAnswer = ans; currentOptions = opts;
        
        vocabQuestionText = (qType === 'has') ? '哪一個詞彙<br><span style="color:var(--neon-green);">有出現</span> 過？' : '哪一個詞彙<br><span style="color:var(--neon-pink);">沒有出現</span> 過？';
        
        let listHtml = ''; selectedWords.forEach(w => { listHtml += `<div class="vocab-word">${w}</div>`; });
        document.getElementById('question-display').innerHTML = '<div style="font-size: 0.4em; color: var(--neon-cyan); text-shadow:none; margin-bottom: 10px;">請記住以下詞彙</div>';
        document.getElementById('vocab-list').innerHTML = listHtml;
        document.getElementById('vocab-memorize-phase').style.display = 'block'; document.getElementById('options-ui').style.display = 'none';
    }
    
    function startAnsweringVocab() {
        document.getElementById('vocab-memorize-phase').style.display = 'none';
        document.getElementById('question-display').innerHTML = `<div style="font-size: 0.5em; line-height: 1.4; text-shadow:none;">${vocabQuestionText}</div>`;
        document.getElementById('options-ui').style.display = 'grid'; 
        document.getElementById('options-ui').classList.add('vocab-mode'); 
        for (let i = 0; i < 4; i++) { document.getElementById(`opt-${i}`).innerText = currentOptions[i]; }
    }
    
    function generateDirectionQuestion(diff) {
        const standardArrows = ['⬆️', '➡️', '⬇️', '⬅️']; let arrowDir = Math.floor(Math.random() * 4);
        let rules = [];
        if (diff === 'beginner') rules = ['opposite']; else if (diff === 'intermediate') rules = ['same', 'opposite']; else rules = ['same', 'opposite', 'left', 'right'];
        let rule = rules[Math.floor(Math.random() * rules.length)], targetDir, ruleText;
        if (rule === 'same') { targetDir = arrowDir; ruleText = '相同方向'; } else if (rule === 'opposite') { targetDir = (arrowDir + 2) % 4; ruleText = '相反方向'; } else if (rule === 'left') { targetDir = (arrowDir + 3) % 4; ruleText = '左方'; } else if (rule === 'right') { targetDir = (arrowDir + 1) % 4; ruleText = '右方'; }
        let ans = ['⬆️', '➡️', '⬇️', '⬅️'][targetDir];
        return { text: `<div style="font-size: 0.4em; color: var(--neon-cyan); margin-bottom: 5px; font-weight: 900; text-shadow:none;">請回答：${ruleText}</div><div class="emoji-display" style="font-size: 1.2em; margin: 0;">${standardArrows[arrowDir]}</div>`, answer: ans };
    }
    
    function handleRandomCodeFlow() {
        let length = (currentDifficulty === 'beginner') ? 3 : (currentDifficulty === 'intermediate') ? 5 : (currentDifficulty === 'advanced') ? 7 : 9;
        let randomStr = ''; for (let i = 0; i < length; i++) randomStr += alphaNumChars.charAt(Math.floor(Math.random() * alphaNumChars.length));
        currentCorrectAnswer = randomStr; document.getElementById('question-display').innerText = randomStr; document.getElementById('rc-memorize-phase').style.display = 'block'; document.getElementById('rc-answer-phase').style.display = 'none'; document.getElementById('rc-input').value = '';
    }
    function startAnsweringRC() { document.getElementById('question-display').innerText = '❓❓❓'; document.getElementById('rc-memorize-phase').style.display = 'none'; document.getElementById('rc-answer-phase').style.display = 'block'; document.getElementById('rc-input').focus(); }
    function submitRC() { if (!isGameActive) return; let playerAnswer = document.getElementById('rc-input').value.toLowerCase().trim(); if (playerAnswer === '') return; triggerFeedback(playerAnswer === currentCorrectAnswer); setTimeout(() => { nextQuestion(); }, 200); }
    
    function handleFlashMemoryFlow() {
        let digits = 3, showTime = 1000;
        if (currentDifficulty === 'beginner') { digits = Math.floor(Math.random() * 2) + 3; showTime = 1000; } 
        else if (currentDifficulty === 'intermediate') { digits = Math.floor(Math.random() * 2) + 3; showTime = 500; } 
        else if (currentDifficulty === 'advanced') { digits = 5; showTime = 800; } 
        else { digits = Math.floor(Math.random() * 2) + 6; showTime = 800; } 
        
        let numStr = (Math.floor(Math.random() * 9) + 1).toString(); for (let i = 1; i < digits; i++) numStr += Math.floor(Math.random() * 10).toString();
        
        currentCorrectAnswer = numStr; currentMemoryInput = ''; isPaused = true; 
        document.getElementById('question-display').innerText = numStr; 
        document.getElementById('memory-input-display').innerText = ''; 
        document.getElementById('numpad-container').style.pointerEvents = 'none'; 
        document.getElementById('numpad-container').style.opacity = '0.5';
        
        setTimeout(() => { 
            if(!isGameActive) return; 
            document.getElementById('question-display').innerText = '?'.repeat(digits); 
            document.getElementById('numpad-container').style.pointerEvents = 'auto'; 
            document.getElementById('numpad-container').style.opacity = '1'; 
            isPaused = false; 
        }, showTime);
    }
    
    function handleNumpad(val) { if (!isGameActive || isPaused) return; if (val === 'del') currentMemoryInput = currentMemoryInput.slice(0, -1); else if (val === 'submit') { if (currentMemoryInput.length > 0) { triggerFeedback(currentMemoryInput === currentCorrectAnswer); setTimeout(() => { nextQuestion(); }, 200); } } else if (currentMemoryInput.length < 10) currentMemoryInput += val; document.getElementById('memory-input-display').innerText = currentMemoryInput; }
    
    function generateDiceQuestion(diff) { let count = (diff === 'beginner') ? 2 : (diff === 'intermediate') ? 3 : (diff === 'advanced') ? 4 : 5; let total = 0, str = '<span class="dice-display">'; for (let i = 0; i < count; i++) { let roll = Math.floor(Math.random() * 6) + 1; total += roll; str += diceFaces[roll - 1] + ' '; } return { text: str + '</span>', answer: total }; }
    
    function generateMathQuestion(diff) {
    let a, b, c, ans, text;
    
    if (diff === 'beginner') {
        // 初級：20以內加減
        if (Math.random() > 0.5) {
            // 加法 (保證總和不大於20)
            a = Math.floor(Math.random() * 19) + 1; 
            b = Math.floor(Math.random() * (20 - a)) + 1;
            ans = a + b;
            text = `${a} + ${b}`;
        } else {
            // 減法 (保證不出現負數)
            a = Math.floor(Math.random() * 20) + 1;
            b = Math.floor(Math.random() * a) + 1;
            ans = a - b;
            text = `${a} - ${b}`;
        }
    } else if (diff === 'intermediate') {
        // 中級：兩位數加減
        if (Math.random() > 0.5) {
            // 兩位數加法 (10~99)
            a = Math.floor(Math.random() * 90) + 10;
            b = Math.floor(Math.random() * 90) + 10;
            ans = a + b;
            text = `${a} + ${b}`;
        } else {
            // 兩位數減法 (確保 a>=b 且皆為兩位數)
            a = Math.floor(Math.random() * 90) + 10;
            b = Math.floor(Math.random() * 90) + 10;
            if (b > a) { let temp = a; a = b; b = temp; } // 交換確保大減小
            ans = a - b;
            text = `${a} - ${b}`;
        }
    } else if (diff === 'advanced') {
        // 高級：乘法 (2~12 乘法表)
        a = Math.floor(Math.random() * 11) + 2; 
        b = Math.floor(Math.random() * 11) + 2; 
        ans = a * b;
        text = `${a} × ${b}`;
    } else {
        // 達人：三位數加減
        if (Math.random() > 0.5) {
            // 三位數加法 (100~999)
            a = Math.floor(Math.random() * 900) + 100;
            b = Math.floor(Math.random() * 900) + 100;
            ans = a + b;
            text = `${a} + ${b}`;
        } else {
            // 三位數減法 (確保 a>=b 且皆為三位數)
            a = Math.floor(Math.random() * 900) + 100;
            b = Math.floor(Math.random() * 900) + 100;
            if (b > a) { let temp = a; a = b; b = temp; } // 交換確保大減小
            ans = a - b;
            text = `${a} - ${b}`;
        }
    }
    return { ans, text };
}
    
    function generateMathOptions(correctAnswer) { 
        let opts = new Set([correctAnswer]); 
        let variance = Math.max(4, Math.floor(Math.abs(correctAnswer) * 0.3)); 
        let attempts = 0;
        while(opts.size < 4) { 
            attempts++;
            if (attempts > 50) variance++;
            let fake = correctAnswer + (Math.floor(Math.random() * (variance * 2 + 1)) - variance); 
            if (fake !== correctAnswer && fake >= 0) opts.add(fake); 
        } 
        let arr = Array.from(opts); 
        for (let i = arr.length - 1; i > 0; i--) { 
            const j = Math.floor(Math.random() * (i + 1)); 
            [arr[i], arr[j]] = [arr[j], arr[i]]; 
        } 
        return arr; 
    }

    function generateReactionMatchQuestion(diff) { let pool = (diff === 'advanced' || diff === 'elite') ? faceEmojis : allEmojis; let tempArr = [...pool], optsArr = []; for (let i = 0; i < 4; i++) { let idx = Math.floor(Math.random() * tempArr.length); optsArr.push(tempArr[idx]); tempArr.splice(idx, 1); } let target = optsArr[Math.floor(Math.random() * 4)]; return { text: `<span class="emoji-display">${target}</span>`, answer: target, options: optsArr }; }
    function submitAnswer(optionIndex) { if (!isGameActive) return; triggerFeedback(currentOptions[optionIndex] === currentCorrectAnswer); nextQuestion(); }

    window.addEventListener('keydown', (e) => {
        if (!isGameActive) return;
        if (currentGameMode === 'random-code-memory' || currentGameMode === 'vocab-memory' && document.getElementById('options-ui').style.display === 'none') return; 
        if (currentGameMode === 'make24' || currentGameMode === 'highcard') return;

        if (currentGameMode === 'flash-memory') { if (isPaused) return; if (e.key >= '0' && e.key <= '9') handleNumpad(e.key); else if (e.key === 'Backspace') handleNumpad('del'); else if (e.key === 'Enter') handleNumpad('submit'); } 
        else { switch(e.key) { case 'ArrowUp': case 'w': case 'W': submitAnswer(0); break; case 'ArrowLeft': case 'a': case 'A': submitAnswer(1); break; case 'ArrowRight': case 'd': case 'D': submitAnswer(2); break; case 'ArrowDown': case 's': case 'S': submitAnswer(3); break; } }
    });

                <div class="nst-cards-container">
                    <div class="nst-card nst-card-back nst-card-deck" id="nst-player-deck-ui" onclick="nstPlayerDraw()">
                        <span style="color:white; font-size:1.1rem; position:absolute; bottom:10px; font-weight:bold;">點擊抽牌</span>
                    </div>
                    <div style="width: 20px;"></div>
                    <div id="nst-player-hand" class="nst-cards-container"></div>
                </div>
                <div id="nst-action-bar">
                    <button id="nst-btn-reshuffle" onclick="nstPlayerReshuffle()" disabled style="width: auto;">🔄 重洗 (手牌需滿7張)</button>
                    <button class="exit-btn" onclick="quitNST()" style="width: auto; padding: 15px 20px; font-size: 1.2em;">🚪 放棄並離開</button>
                </div>
            </div>
        </div>
    </div>

    <div id="nst-result" class="nst-screen">
        <h1 id="nst-result-text" style="font-size: 3rem; margin-bottom: 30px;"></h1>
        <button onclick="nstNavTo('nst-menu')">再玩一次</button>
        <button class="back-btn" onclick="nstNavTo('main-lobby')">返回主目錄</button>
    </div>
</body>
</html>
